<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self';
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                   font-src 'self' https://fonts.gstatic.com;
                   connect-src 'self' ws://127.0.0.1:* wss://127.0.0.1:*;
                   img-src 'self' data: blob:;">
    <title>TOS</title>
    <style>
        /* Loading state while Svelte renderer boots */
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .tos-loader {
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.3s forwards;
        }
        .tos-loader h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 0.5em;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tos-loader .bar {
            width: 200px;
            height: 2px;
            background: rgba(124, 58, 237, 0.2);
            border-radius: 1px;
            overflow: hidden;
            margin: 0 auto;
        }
        .tos-loader .bar::after {
            content: '';
            display: block;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            border-radius: 1px;
            animation: slide 1.5s ease-in-out infinite;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes slide {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div class="tos-loader" id="tos-boot-loader">
        <h1>TOS</h1>
        <div class="bar"></div>
    </div>

    <!--
        The Svelte UI is loaded into this page by the Electron main process.
        This HTML is a fallback shell shown during boot.
        In production, the Svelte build's index.html replaces this entirely.
    -->
</body>
</html>
